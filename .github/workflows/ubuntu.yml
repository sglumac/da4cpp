name: Ubuntu

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: update
        run: sudo apt-get update

      - name: libclang
        run: sudo apt-get install -y libclang-dev

      - name: llvm
        run: sudo apt-get install -y llvm

      - name: catch2
        run: sudo apt-get install -y catch2

      - name: configure
        run: cmake --preset=clang-coverage-config

      - name: build
        run: cmake --build --parallel 4 --preset=clang-coverage-build

      - name: test
        run: ctest --preset=clang-coverage-test

      - name: merge coverage data
        run: llvm-profdata merge -sparse build/clang-coverage/da4cpp.ctest.profraw -o build/clang-coverage/da4cpp.profdata

      - name: generate coverage report
        run: llvm-cov export -format=lcov build/clang-coverage/src/da4c=build/clang-coverage/da4cpp.profdata > build/clang-coverage/coverage.info

      - name: upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: build/clang-coverage/coverage.info
          fail_ci_if_error: true
